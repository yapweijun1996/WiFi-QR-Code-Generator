<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
		<meta name="theme-color" content="#4f46e5">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="description" content="Generate QR codes for WiFi network access. Scan to connect instantly.">
		<title>WiFi QR Code Generator</title>
		<link rel="stylesheet" href="css/style.css">
		<link rel="manifest" href="manifest.json">
		<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
		<link rel="apple-touch-icon" href="icons/icon-192.png">
	</head>
	<body>
		<div id="container">
			<!-- Header -->
			<div class="header">
				<div class="header-icon">
					<svg width="40" height="40" viewBox="0 0 40 40" fill="none">
						<rect width="40" height="40" rx="10" fill="#4f46e5"/>
						<path d="M12 24a11.5 11.5 0 0 1 16 0" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
						<path d="M8 20a17 17 0 0 1 24 0" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
						<path d="M16 28a5.5 5.5 0 0 1 8 0" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
						<circle cx="20" cy="32" r="1.8" fill="#fff"/>
					</svg>
				</div>
				<h1>WiFi QR Code Generator</h1>
				<p class="subtitle">Create a QR code to share your WiFi instantly</p>
			</div>

			<!-- Install banner -->
			<div id="installBanner" class="install-banner">
				<span>📲 Install this app for offline use</span>
				<button class="btn btn-install" id="installBtn">Install</button>
			</div>

			<!-- Form card -->
			<div class="card">
				<form id="wifi-form">
					<div class="form-group">
						<label for="ssid">Network Name (SSID)</label>
						<input type="text" id="ssid" placeholder="e.g. MyHomeWiFi" required>
					</div>

					<div class="form-group">
						<label for="password">Password</label>
						<div class="password-wrapper">
							<input type="password" id="password" placeholder="Enter WiFi password" required>
							<button type="button" id="togglePassword" class="toggle-pw" aria-label="Toggle password visibility">
								<svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
									<circle cx="12" cy="12" r="3"/>
								</svg>
							</button>
						</div>
					</div>

					<div class="form-group">
						<label for="encryption">Security</label>
						<select id="encryption">
							<option value="WPA">WPA / WPA2 / WPA3</option>
							<option value="WEP">WEP</option>
							<option value="nopass">Open (No password)</option>
						</select>
					</div>

					<button type="submit" class="btn btn-primary">
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 6px;">
							<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
						</svg>
						Generate QR Code
					</button>
				</form>
			</div>

			<!-- QR Code result -->
			<div id="qrResult" class="card qr-result" style="display:none">
				<div class="qr-result-header">Your QR Code</div>
				<div id="qrCode"></div>
			</div>

			<!-- Saved networks -->
			<div id="savedSection" class="card saved-section" style="display:none">
				<div class="saved-header">
					<h2>
						<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 4px;">
							<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
						</svg>
						History
					</h2>
					<button id="clearAll" class="btn btn-ghost">Clear All</button>
				</div>
				<ul id="savedList" class="saved-list"></ul>
			</div>
		</div>

		<div id="toast" class="toast"></div>

		<script src="js/qrcode.min.js"></script>
		<script src="js/db.js"></script>
		<script src="js/app.js"></script>
	</body>
</html>
