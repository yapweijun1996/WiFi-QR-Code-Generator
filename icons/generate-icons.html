<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each image and "Save image as" to save the PNG icons.</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(canvas) {
	const s = canvas.width;
	const ctx = canvas.getContext("2d");
	const r = s / 512;

	// Background
	ctx.fillStyle = "#5cb85c";
	ctx.beginPath();
	ctx.roundRect(0, 0, s, s, 64 * r);
	ctx.fill();

	// WiFi arcs
	ctx.strokeStyle = "#fff";
	ctx.lineWidth = 32 * r;
	ctx.lineCap = "round";

	[[256, 248, 144, -0.8, -2.34], [256, 248, 220, -0.65, -2.49], [256, 248, 76, -0.95, -2.19]].forEach(([cx, cy, radius, start, end]) => {
		ctx.beginPath();
		ctx.arc(cx * r, cy * r, radius * r, end, start);
		ctx.stroke();
	});

	// Dot
	ctx.fillStyle = "#fff";
	ctx.beginPath();
	ctx.arc(256 * r, 408 * r, 24 * r, 0, Math.PI * 2);
	ctx.fill();

	// QR corners
	ctx.fillStyle = "rgba(255,255,255,0.3)";
	[[80, 80], [376, 80], [80, 376]].forEach(([x, y]) => {
		ctx.beginPath();
		ctx.roundRect(x * r, y * r, 56 * r, 56 * r, 8 * r);
		ctx.fill();
	});

	// Convert to downloadable link
	const link = document.createElement("a");
	link.download = `icon-${s}.png`;
	link.href = canvas.toDataURL("image/png");
	link.textContent = `Download icon-${s}.png`;
	canvas.parentNode.insertBefore(link, canvas.nextSibling);
}

draw(document.getElementById("c192"));
draw(document.getElementById("c512"));
</script>
</body>
</html>
